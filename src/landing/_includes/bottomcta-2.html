<section class="bg-[var(--brand-secondary)] py-10 md:py-12 lg:py-[60px]">
  <div class="max-w-[1440px] mx-auto px-[15px] md:px-[26px] lg:px-[80px] xl:px-[160px]">

    <!-- Outer wrapper: extra top margin gives the badge room to overhang -->
    <div class="relative mt-7">

      <!-- WAREHOUSE SALE badge — overlaps top edge of card -->
      <div class="absolute -top-7 left-1/2 -translate-x-1/2 z-10 bg-[var(--brand-primary)] px-10 md:px-[60px] py-[6px] md:py-2 rounded-[8px] whitespace-nowrap">
        <span class="text-white font-extrabold text-[18px] md:text-[20px] lg:text-[22px] uppercase tracking-tight">
          {{ bottomcta_2_badge_text }}
        </span>
      </div>

      <!-- Card -->
      <div class="bg-white border-2 border-dashed border-[var(--brand-primary)] rounded-[16px] overflow-hidden flex flex-col lg:flex-row">

        <!-- Product image: full-width on mobile/tablet, left column on desktop -->
        <div class="w-full h-[333px] md:h-[400px] lg:h-auto lg:w-[45%] lg:self-stretch shrink-0">
          <img
            src="{{ 'images/_shared/1x1_1.svg' | campaign_asset }}"
            alt="{{ bottomcta_2_product_image_alt }}"
            class="w-full h-full object-cover"
          >
        </div>

        <!-- Content -->
        <div class="flex flex-col gap-3 md:gap-[14px] lg:gap-5 items-center justify-center px-3 md:px-[12px] lg:px-10 py-8 lg:py-[80px]">

          <!-- Overline with side dividers -->
          <div class="flex items-center gap-3 w-full">
            <div class="flex-1 h-px bg-[var(--brand-primary)]"></div>
            <span class="text-[14px] font-extrabold uppercase tracking-[0.1em] text-[var(--brand-primary)] text-center whitespace-nowrap shrink-0">
              {{ bottomcta_2_overline }}
            </span>
            <div class="flex-1 h-px bg-[var(--brand-primary)]"></div>
          </div>

          <!-- Heading -->
          <h2 class="text-[32px] md:text-[36px] lg:text-[44px] font-extrabold uppercase leading-[1.2] tracking-tight text-[var(--text-primary)] text-center">
            {{ bottomcta_2_heading }}
          </h2>

          <!-- Subtext -->
          <p class="text-[18px] md:text-[20px] leading-[1.5] tracking-tight text-[var(--text-primary)] text-center max-w-[400px]">
            {{ bottomcta_2_subtext }}
          </p>

          <!-- CTA block -->
          <div class="flex flex-col gap-2 items-center w-full max-w-[440px]">
            <a href="{{ next_url }}" class="w-full bg-[var(--brand-primary)] text-white rounded-[6px] px-6 py-5 flex items-center justify-center gap-4">
              <span class="font-bold text-[20px] leading-[1.5] tracking-tight whitespace-nowrap">
                {{ cta_text }}
              </span>
              <img src="{{ 'images/_shared/arrow-right.svg' | campaign_asset }}" alt="" class="w-3 h-3 shrink-0">
            </a>
            <div class="flex items-center gap-2">
              <img src="{{ 'images/_shared/cta-guarantee-icon.png' | campaign_asset }}" alt="" class="w-5 h-[19px] shrink-0">
              <span class="text-[16px] font-semibold tracking-tight text-[var(--text-primary)] whitespace-nowrap">
                {{ guarantee_text }}
              </span>
            </div>
          </div>

        </div>
      </div>
    </div>

  </div>
</section>
