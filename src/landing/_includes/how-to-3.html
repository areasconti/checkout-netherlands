<section class="w-full overflow-hidden bg-white">
  <div class="max-w-[1440px] mx-auto px-[15px] md:px-[26px] lg:px-[80px] xl:px-[160px] py-[40px] md:py-[48px] lg:py-[60px]">
    <div class="flex flex-col items-center gap-[32px] md:gap-[40px] lg:gap-[48px]">
      <h2 class="text-center text-[28px] md:text-[32px] lg:text-[40px] leading-[1.2] tracking-[-0.14px] md:tracking-[-0.16px] lg:tracking-[-0.2px] font-bold text-[var(--text-primary)] max-w-[312px] md:max-w-none">
        {{ how_to_3_heading }}
      </h2>

      <div class="w-full flex flex-col md:flex-row items-start md:items-center gap-[32px] md:gap-[40px] lg:gap-[48px]">
        <div class="w-full md:flex-1 aspect-square rounded-[8px] md:rounded-[12px] lg:rounded-[16px] overflow-hidden">
          <img src="{{ how_to_3_how_to_image | campaign_asset }}" alt="{{ how_to_3_how_to_image_alt }}" class="w-full h-full object-cover">
        </div>

        <div class="w-full md:flex-1 flex items-center gap-[24px] md:gap-[32px] lg:gap-[40px]">
          <div class="shrink-0 flex flex-col items-center">
            <div class="relative w-[70px] h-[70px] lg:w-[100px] lg:h-[100px]">
              <img src="{{ 'images/how-to-3/how-to-3-circle.svg' | campaign_asset }}" alt="" class="w-full h-full" aria-hidden="true">
              <img src="{{ 'images/how-to-3/how-to-3-star.svg' | campaign_asset }}" alt="" class="absolute inset-0 m-auto w-[28px] h-[28px] lg:w-[40px] lg:h-[40px]" aria-hidden="true">
            </div>
            <div class="w-[2px] h-[90px] md:h-[110px] lg:h-[70px] border-l-2 border-dashed border-[var(--brand-primary)]"></div>

            <div class="relative w-[70px] h-[70px] lg:w-[100px] lg:h-[100px]">
              <img src="{{ 'images/how-to-3/how-to-3-circle.svg' | campaign_asset }}" alt="" class="w-full h-full" aria-hidden="true">
              <img src="{{ 'images/how-to-3/how-to-3-star.svg' | campaign_asset }}" alt="" class="absolute inset-0 m-auto w-[28px] h-[28px] lg:w-[40px] lg:h-[40px]" aria-hidden="true">
            </div>
            <div class="w-[2px] h-[90px] md:h-[110px] lg:h-[70px] border-l-2 border-dashed border-[var(--brand-primary)]"></div>

            <div class="relative w-[70px] h-[70px] lg:w-[100px] lg:h-[100px]">
              <img src="{{ 'images/how-to-3/how-to-3-circle.svg' | campaign_asset }}" alt="" class="w-full h-full" aria-hidden="true">
              <img src="{{ 'images/how-to-3/how-to-3-star.svg' | campaign_asset }}" alt="" class="absolute inset-0 m-auto w-[28px] h-[28px] lg:w-[40px] lg:h-[40px]" aria-hidden="true">
            </div>
          </div>

          <div class="flex-1 flex flex-col justify-center gap-[40px] md:gap-[48px] lg:gap-[60px]">
            <div class="w-[251px] md:w-[262px] lg:w-[396px] flex flex-col gap-[12px] md:gap-[16px] lg:gap-[20px]">
              <p class="text-[20px] lg:text-[24px] leading-[1.4] tracking-[-0.1px] lg:tracking-[-0.12px] font-bold text-[var(--text-primary)]">
                {{ how_to_3_step_1_title }}
              </p>
              <p class="text-[16px] md:text-[18px] leading-[1.5] tracking-[-0.08px] md:tracking-[-0.09px] text-[var(--text-primary)]">
                {{ how_to_3_step_1_body }}
              </p>
            </div>

            <div class="w-[251px] md:w-[262px] lg:w-[396px] flex flex-col gap-[12px] md:gap-[16px] lg:gap-[20px]">
              <p class="text-[20px] lg:text-[24px] leading-[1.4] tracking-[-0.1px] lg:tracking-[-0.12px] font-bold text-[var(--text-primary)]">
                {{ how_to_3_step_2_title }}
              </p>
              <p class="text-[16px] md:text-[18px] leading-[1.5] tracking-[-0.08px] md:tracking-[-0.09px] text-[var(--text-primary)]">
                {{ how_to_3_step_2_body }}
              </p>
            </div>

            <div class="w-[251px] md:w-[262px] lg:w-[396px] flex flex-col gap-[12px] md:gap-[16px] lg:gap-[20px]">
              <p class="text-[20px] lg:text-[24px] leading-[1.4] tracking-[-0.1px] lg:tracking-[-0.12px] font-bold text-[var(--text-primary)]">
                {{ how_to_3_step_3_title }}
              </p>
              <p class="text-[16px] md:text-[18px] leading-[1.5] tracking-[-0.08px] md:tracking-[-0.09px] text-[var(--text-primary)]">
                {{ how_to_3_step_3_body }}
              </p>
            </div>

          </div>
        </div>
      </div>

      <div class="flex flex-col items-center gap-[8px] md:gap-[10px] lg:gap-[12px] w-full max-w-[440px]">
        <a href="{{ next_url }}"
          class="w-full bg-[var(--brand-primary)] rounded-[6px] py-[20px] px-[24px] flex items-center justify-center gap-[20px] no-underline">
            <span class="font-bold text-[20px] text-white text-center tracking-[-0.1px] leading-[1.5] whitespace-nowrap">{{ cta_text }}</span>
            <img src="{{ 'images/_shared/arrow-right.svg' | campaign_asset }}" alt="" class="w-[16px] h-[12px] shrink-0">
        </a>
        <div class="flex items-center gap-[8px]">
            <img src="{{ 'images/_shared/cta-guarantee-icon.png' | campaign_asset }}" alt="" class="w-[20px] h-[19px] shrink-0">
            <p class="font-semibold text-[16px] text-[var(--text-primary)] text-center tracking-[-0.08px] leading-[1.5] whitespace-nowrap">{{ guarantee_text }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
