<style>
  /*
   * Checkout header layout
   * ─────────────────────────────────────────────────────────────────────────
   * Desktop  : [partner-logos (sx)]              [90-dag garantie (dx)]
   * Mobile   : [partner-logos (gecentreerd)] — garantie verborgen
   * ─────────────────────────────────────────────────────────────────────────
   */

  .cc-header-partner-logos {
    display: block;
    height: 48px;
    width: auto;
    max-width: 320px;
    object-fit: contain;
  }

  .cc-header-guarantee {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    flex-shrink: 0;
  }

  .cc-header-guarantee__badge {
    width: 50px;
    height: 50px;
    flex-shrink: 0;
    display: block;
  }

  .cc-header-guarantee__text {
    font-size: 0.78rem;
    font-weight: 700;
    line-height: 1.4;
    color: var(--brand--color--foreground, #1a1a1a);
    white-space: nowrap;
  }

  /* ── Mobile: centreer alleen de betaallogos, verberg garantie ──────────── */
  @media (max-width: 600px) {
    .checkout-header__inner {
      justify-content: center !important;
    }

    .cc-header-guarantee {
      display: none;
    }

    .cc-header-partner-logos {
      height: 38px;
      max-width: 240px;
    }
  }
</style>

<section class="checkout-header">
  <div class="container cc-medium">
    <div class="checkout-header__inner">

      <!-- LINKS / MOBILE CENTER: betaalmethoden -->
      <div class="checkout-header__brand">
        <img loading="eager"
             src="{{ 'images/partner-logos.avif' | campaign_asset }}"
             alt="iDEAL · Bancontact"
             class="cc-header-partner-logos">
      </div>

      <!-- RECHTS: 90-dagen geld-terug-garantie (alleen desktop) -->
      <div class="checkout-header__extras cc-header-guarantee">
        <img loading="lazy"
             src="{{ 'images/90d.webp' | campaign_asset }}"
             alt="90 Dagen Geld-Terug-Garantie"
             class="cc-header-guarantee__badge">
        <div class="cc-header-guarantee__text">
          90 Dagen 100%<br>Geld-Terug-Garantie
        </div>
      </div>

    </div>
  </div>
</section>
