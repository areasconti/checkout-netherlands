<div data-next-catalog-component="order-summary" class="summary-wrapper" data-next-cart-summary>
  <template>
    <div class="order-summary">
      <h4 class="order-summary__title">Order Summary</h4>
      <div class="order-summary__content">

    <div class="cart-items cart-items__list">
      <div data-next-component="scroll-hint" class="cart-items__scroll-hint cart-items__scroll-hint--active">
        <div>Scroll for more items</div>
        <div class="icon__view-more">
          <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="iconify iconify--ic" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24">
            <path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6l-6-6z"></path>
          </svg>
        </div>
      </div>
      <div data-summary-lines>
        <template>
          <div data-package-id="{item.packageId}" class="cart-item">
            <div class="cart-item__wrapper">
              <div class="cart-item__image-container">
                <div class="cart-item__quantity-badge">
                  <div class="cart-item__quantity">{item.quantity}</div>
                </div>
                <img src="{item.image}" alt="{item.name}" class="cart-item__image">
              </div>
              <div class="cart-item__details">
                <div class="cart-item__content">
                  <div class="cart-item__description">
                    <div class="cart-item__header">
                      <div class="cart-item__title">{item.name}</div>
                    </div>
                    <div class="cart-item__frequency">
                      <span data-next-show="item.isRecurring" style="display:none">{item.frequency}</span>
                      <span data-next-hide="item.isRecurring">One-time purchase</span>
                    </div>
                    <div class="hide">
                      <div class="text-2xs text-muted text-weight-normal diagonal-strike {item.hasDiscount}">{item.originalUnitPrice}/ea</div>
                      <div class="text-2xs text-muted text-weight-normal">{item.unitPrice}/ea</div>
                    </div>
                  </div>
                  <div class="cart-item__pricing">
                    <div class="cart-price price--original {item.hasDiscount}">{item.originalPrice}</div>
                    <div class="checkout__line-item__final-price">{item.price}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="order-totals os-cart-summary-totals">

      <div class="order-totals__section">
        <div class="order-totals__line">
          <div class="order-totals__label">Subtotal</div>
          <div class="order-totals__value">{subtotal}</div>
        </div>
      </div>

      <!-- Per-discount rows — SDK 0.4.13+: data-next-discounts works inside data-next-cart-summary -->
      <div class="order-totals__section">
        <ul class="order-totals__discount-list" data-next-discounts="offer" aria-label="Offer discounts">
          <template>
            <li class="order-totals__line">
              <div class="order-totals__label text-muted">{discount.name}</div>
              <div class="order-totals__value text-muted">−{discount.amount}</div>
            </li>
          </template>
        </ul>
        <ul class="order-totals__discount-list" data-next-discounts="voucher" aria-label="Coupon discounts">
          <template>
            <li class="order-totals__line">
              <div class="order-totals__label text-muted">{discount.name}</div>
              <div class="order-totals__value text-muted">−{discount.amount}</div>
            </li>
          </template>
        </ul>
      </div>

      <div class="order-totals__section">
        <div class="order-totals__line">
          <div class="order-totals__label-group">
            <div class="order-totals__label">Shipping</div>
          </div>
          <div class="order-totals__value-group">
            <div class="order-totals__value">{shipping}</div>
          </div>
        </div>
      </div>

      <div class="order-totals__section os-cart-summary-row--discount">
        <div class="order-totals__line">
          <div class="order-totals__label-group">
            <div class="order-totals__label">Today You Saved</div>
            <div class="badge badge--small">
              <div class="label__wrapper cc-sm">
                <div class="badge__text"><span data-next-display="cart.totalDiscountPercentage"></span> OFF</div>
              </div>
            </div>
          </div>
          <div class="order-totals__value-group">
            <div class="order-totals__label">Discount:</div>
            <div class="order-totals__value">{discounts}</div>
          </div>
        </div>
        <!-- Coupon tag badge — uncomment to show applied coupon code below the savings row.
        <div class="coupon-tags" data-next-show="cart.hasCoupon" style="display:none">
          <div class="order-totals__line items-center">
            <div class="cart-subtext">Code applied</div>
            <div data-next-discounts="voucher">
              <template>
                <div class="badge badge--small">
                  <div class="label__wrapper cc-sm">
                    <div class="badge__text">{discount.description}</div>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </div>
        -->
      </div>

      <!-- Tax: {tax} token not wired in CartSummaryEnhancer (BS-017) — kept hidden -->
      <div class="order-totals__section hide">
        <div class="order-totals__line">
          <div class="order-totals__label-group">
            <div class="order-totals__label">Estimated taxes</div>
            <div data-checkout-tooltip-position="top" data-checkout-tooltip="The final tax amount and total will be confirmed by email or text after your place your order." class="info-icons">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" focusable="false" aria-hidden="true" fill="none" stroke="currentColor">
                <circle cx="7" cy="7" r="5.6" stroke="currentColor"></circle>
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.6 5.1c.2-1.3 2.6-1.3 2.8 0S6.95 6.4 6.95 7.45m.055 2.35H7v.005h.005z"></path>
                <circle cx="7" cy="9.7" r="0.1" fill="currentColor"></circle>
              </svg>
            </div>
          </div>
          <div class="order-totals__value-group">
            <div class="order-totals__value">Calculated at checkout</div>
          </div>
        </div>
      </div>

      <div class="order-totals__section cc-total">
        <div class="order-totals__line order-totals__line--total">
          <div class="order-totals__label order-totals__label--total">Grand Total:</div>
          <div class="order-totals__value-group">
            <div class="summary-total__coin">{currency}</div>
            <div class="order-totals__value order-totals__value--total">{total}</div>
          </div>
        </div>
        <div data-next-show="cart.hasDiscounts" style="display:none" class="order-totals__savings">
          <div class="order-totals__savings-content">
            <div class="order-totals__savings-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 18 18" focusable="false" aria-hidden="true" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m10.802 15.686 5.367-5.368a.15.15 0 0 0 .046-.109V4.144m-2.998-.95h-5.67a.16.16 0 0 0-.11.046L1.779 8.897a.154.154 0 0 0 0 .219l5.594 5.593c.06.06.158.06.218 0l5.658-5.657a.15.15 0 0 0 .045-.11v-5.67a.077.077 0 0 0-.077-.077Zm-3.06 3.749a.643.643 0 1 1-1.286 0 .643.643 0 0 1 1.286 0m-.648-.005h.01v.01h-.01z"></path>
              </svg>
            </div>
            <div class="order-totals__savings-text">TODAY YOU SAVED <span>{discounts}</span></div>
          </div>
        </div>
      </div>

    </div>

      </div>
    </div>

  </template>

  <!-- Coupon form — sits outside <template> so it is not rebuilt on every cart update -->
  <div data-next-hide="cart.isEmpty" class="coupon-section" data-next-await>
    <div class="coupon-form">
      <div data-auto-apply="true" data-next-coupon="input" data-placeholder="Promo code (optional)" data-button-text="Apply" class="coupon-form__row">
        <div class="form-group">
          <div class="form-input">
            <input name="coupon" data-name="Coupon Code" type="text" placeholder="Promo code (optional)" class="input-flds">
          </div>
        </div>
        <button class="coupon-button next-disabled">
          <div>APPLY</div>
        </button>
      </div>
    </div>
  </div>

</div>
