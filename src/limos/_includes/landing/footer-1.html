<footer class="bg-white py-[24px] md:py-[32px] lg:py-[40px]">
  <div class="max-w-[1440px] mx-auto px-[15px] md:px-[26px]">
    <div class="flex flex-col items-center gap-[12px] md:gap-[16px] lg:gap-[20px]">
      <img src="{{ footer_1_logo_image | campaign_asset }}" alt="{{ footer_1_logo_alt }}" class="w-[112px] h-[48px] md:w-[131px] md:h-[56px] lg:w-[140px] lg:h-[60px] object-cover">

      <div class="flex flex-wrap items-center justify-center gap-x-[8px] gap-y-[2px] md:gap-x-[10px] lg:gap-x-[12px] text-[var(--text-primary)] text-center">
        <a href="{{ footer_1_terms_url }}" class="font-normal text-[14px] md:text-[14px] lg:text-[16px] leading-[1.5] tracking-[-0.07px] lg:tracking-[-0.08px]">{{ footer_1_terms_text }}</a>
        <span class="font-normal text-[12px] md:text-[14px] leading-[1.5] tracking-[-0.06px] md:tracking-[-0.07px]">|</span>
        <a href="{{ footer_1_privacy_url }}" class="font-normal text-[14px] md:text-[14px] lg:text-[16px] leading-[1.5] tracking-[-0.07px] lg:tracking-[-0.08px]">{{ footer_1_privacy_text }}</a>
        <span class="font-normal text-[12px] md:text-[14px] leading-[1.5] tracking-[-0.06px] md:tracking-[-0.07px]">|</span>
        <a href="{{ footer_1_contact_url }}" class="font-normal text-[14px] md:text-[14px] lg:text-[16px] leading-[1.5] tracking-[-0.07px] lg:tracking-[-0.08px]">{{ footer_1_contact_text }}</a>
      </div>

      <p class="text-center font-normal text-[14px] md:text-[14px] lg:text-[16px] leading-[1.5] tracking-[-0.07px] lg:tracking-[-0.08px] text-[var(--text-primary)]">{{ footer_1_copyright_text }}</p>
    </div>
  </div>
</footer>
