<!-- Prepurchase upsell: checkbox bump (check02) — SDK 0.4.x flat layout
     Uses data-next-package-toggle / data-next-toggle-card / data-next-toggle-display + data-next-toggle-image
     Do not put Liquid tags inside HTML comments — Liquid still executes them. -->
<div data-next-catalog-component="order-bump-card" data-component="prepurchase-upsell" data-variant="check02" data-next-await="">
  <div data-next-package-toggle>
    <div data-next-toggle-card data-next-is-upsell="true" data-next-package-sync="1" data-next-package-id="9" class="next-active">
      <div data-next-toggle="toggle" class="bump__header next-active">
        <div class="bump__header-content">
          <div class="bump__checkbox">
            <div os-component="check" class="checkbox__icon"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="iconify iconify--fe" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"><path fill="currentColor" fill-rule="evenodd" d="m6 10l-2 2l6 6L20 8l-2-2l-8 8z"></path></svg></div>
          </div>
          <div class="bump__title">YES, &nbsp;I Will Take It</div>
          <div data-animate="right" class="bump__arrow"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="iconify iconify--bx" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"><path d="M5.536 21.886a1.004 1.004 0 0 0 1.033-.064l13-9a1 1 0 0 0 0-1.644l-13-9A1 1 0 0 0 5 3v18a1 1 0 0 0 .536.886z" fill="currentColor"></path></svg></div>
          <div data-animate="left" class="bump__arrow bump__arrow--right"><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" role="img" class="iconify iconify--bx" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" viewBox="0 0 24 24"><path d="M4.431 12.822l13 9A1 1 0 0 0 19 21V3a1 1 0 0 0-1.569-.823l-13 9a1.003 1.003 0 0 0 0 1.645z" fill="currentColor"></path></svg></div>
        </div>
      </div>
      <div class="bump__body">
        <div class="bump__content">
          <img data-next-toggle-image loading="lazy" alt="" src="{{ 'images/icon.svg' | campaign_asset }}" class="bump__image">
          <div class="bump__description">Get peace of mind with <span data-next-display="package.9.name">Shipping Guarantee</span> in the event your delivery is damaged, stolen, or lost during transit for <span data-next-toggle-display="price" class="display-visible">$1.99</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
